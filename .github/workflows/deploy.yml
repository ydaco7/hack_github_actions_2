name: Deploy and integration to Github Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar reporitorio / Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar estructura del sitio
        run: |
          test -f index.html || (echo "::error::No existe index.html en la raíz" && exit 1)
          echo "index.html encontrado, validación básica OK"

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: integration
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
